steps:
  # ── Build API ───────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-api'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/holaprime-api:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/holaprime-api:latest
      - -f
      - api/Dockerfile
      - api

  # ── Build Admin Panel ───────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-admin'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/holaprime-admin:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/holaprime-admin:latest
      - -f
      - admin/Dockerfile
      - admin

  # ── Build Trader App ────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-app'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/holaprime-app:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/holaprime-app:latest
      - -f
      - app/Dockerfile
      - app

  # ── Push images ─────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-api'
    args: [push, gcr.io/$PROJECT_ID/holaprime-api:$COMMIT_SHA]
    waitFor: ['build-api']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-admin'
    args: [push, gcr.io/$PROJECT_ID/holaprime-admin:$COMMIT_SHA]
    waitFor: ['build-admin']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-app'
    args: [push, gcr.io/$PROJECT_ID/holaprime-app:$COMMIT_SHA]
    waitFor: ['build-app']

  # ── Deploy API ──────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-api'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - holaprime-admin
      - --image=gcr.io/$PROJECT_ID/holaprime-api:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --max-instances=10
      - --memory=512Mi
      - --set-env-vars=NODE_ENV=production
      - --remove-env-vars=PORT
      - --update-secrets=DATABASE_URL=holaprime-db-url:latest,JWT_SECRET=holaprime-jwt-secret:latest,JWT_REFRESH_SECRET=holaprime-jwt-refresh:latest
    waitFor: ['push-api']

options:
  logging: CLOUD_LOGGING_ONLY
