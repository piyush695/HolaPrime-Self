steps:
  # ── Build API ───────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-api'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/holaprime-api:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/holaprime-api:latest
      - -f
      - api/Dockerfile
      - api

  # ── Build Admin Panel ───────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-admin'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/holaprime-admin:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/holaprime-admin:latest
      - -f
      - admin/Dockerfile
      - admin

  # ── Build Trader App ────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-app'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/holaprime-app:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/holaprime-app:latest
      - -f
      - app/Dockerfile
      - app

  # ── Push images ─────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-api'
    args: [push, gcr.io/$PROJECT_ID/holaprime-api:$COMMIT_SHA]
    waitFor: ['build-api']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-admin'
    args: [push, gcr.io/$PROJECT_ID/holaprime-admin:$COMMIT_SHA]
    waitFor: ['build-admin']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-app'
    args: [push, gcr.io/$PROJECT_ID/holaprime-app:$COMMIT_SHA]
    waitFor: ['build-app']

  # ── Run migrations ──────────────────────────────────────────────────────────
  - name: 'gcr.io/$PROJECT_ID/holaprime-api:$COMMIT_SHA'
    id: 'migrate'
    entrypoint: 'npx'
    args: ['tsx', 'src/db/migrate.ts']
    secretEnv: ['DATABASE_URL']
    waitFor: ['push-api']

  # ── Deploy API ──────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-api'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - holaprime-api
      - --image=gcr.io/$PROJECT_ID/holaprime-api:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --max-instances=10
      - --memory=512Mi
      - --port=3001
      - --update-secrets=DATABASE_URL=holaprime-db-url:latest,JWT_SECRET=holaprime-jwt-secret:latest,JWT_REFRESH_SECRET=holaprime-jwt-refresh:latest
      - --update-env-vars=NODE_ENV=production,FRONTEND_URL=https://${_ADMIN_URL}
    waitFor: ['migrate']

  # ── Deploy Admin Panel ──────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-admin'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - holaprime-admin
      - --image=gcr.io/$PROJECT_ID/holaprime-admin:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --max-instances=5
      - --memory=256Mi
      - --port=80
    waitFor: ['push-admin']

  # ── Deploy Trader App ───────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-app'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - holaprime-app
      - --image=gcr.io/$PROJECT_ID/holaprime-app:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --max-instances=10
      - --memory=256Mi
      - --port=80
    waitFor: ['push-app']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/holaprime-db-url/versions/latest
      env: 'DATABASE_URL'

substitutions:
  _ADMIN_URL: holaprime-admin-placeholder-uc.a.run.app  # replace with your actual admin Cloud Run URL

options:
  logging: CLOUD_LOGGING_ONLY
