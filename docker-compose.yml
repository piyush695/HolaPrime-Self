services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: holaprime
      POSTGRES_USER: holaprime
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-holaprime_dev}
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holaprime"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://holaprime:${POSTGRES_PASSWORD:-holaprime_dev}@postgres:5432/holaprime
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_in_prod}
      GCS_BUCKET: ${GCS_BUCKET:-holaprime-kyc-dev}
    ports:
      - 3001:3001
    restart: unless-stopped
    volumes:
      - ./api/src:/app/src

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: http://api:3001
    ports:
      - 5173:5173
    restart: unless-stopped
    volumes:
      - ./admin/src:/app/src

  app:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: http://api:3001
    ports:
      - 5174:5174
    restart: unless-stopped
    volumes:
      - ./app/src:/app/src

volumes:
  postgres_data:
